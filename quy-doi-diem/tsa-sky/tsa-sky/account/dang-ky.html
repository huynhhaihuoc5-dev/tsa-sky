<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký - SKY EDU</title>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Be Vietnam Pro', sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #EBF4FF 0%, #FFF7ED 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .auth-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(5, 26, 57, 0.1);
            padding: 48px;
            width: 100%;
            max-width: 480px;
        }
        
        .logo-section {
            text-align: center;
            margin-bottom: 32px;
        }
        
        .logo-text {
            font-size: 32px;
            font-weight: 800;
            background: linear-gradient(135deg, #1677FF 0%, #4364F7 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
        }
        
        .logo-subtitle {
            font-size: 13px;
            color: #64748B;
            font-weight: 500;
        }
        
        h2 {
            font-size: 24px;
            color: #0F172A;
            margin-bottom: 8px;
            text-align: center;
        }
        
        .subtitle {
            text-align: center;
            color: #64748B;
            font-size: 14px;
            margin-bottom: 32px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #334155;
            margin-bottom: 8px;
        }
        
        input[type="text"],
        input[type="email"],
        input[type="password"] {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #E2E8F0;
            border-radius: 10px;
            font-size: 15px;
            transition: all 0.2s;
            outline: none;
        }
        
        input:focus {
            border-color: #1677FF;
            box-shadow: 0 0 0 3px rgba(22, 119, 255, 0.1);
        }
        
        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 24px;
        }
        
        .checkbox-group input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }
        
        .checkbox-group label {
            margin: 0;
            font-size: 14px;
            font-weight: 500;
            color: #475569;
            cursor: pointer;
        }
        
        .btn-primary {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #1677FF 0%, #4364F7 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(22, 119, 255, 0.3);
        }
        
        .footer-link {
            text-align: center;
            margin-top: 24px;
            font-size: 14px;
            color: #64748B;
        }
        
        .footer-link a {
            color: #1677FF;
            font-weight: 600;
            text-decoration: none;
        }
        
        .footer-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="logo-section">
            <div class="logo-text">SKY EDU</div>
            <div class="logo-subtitle">Fly higher - Think better</div>
        </div>
        
        <h2>Đăng ký tài khoản</h2>
        <p class="subtitle">Tạo tài khoản để bắt đầu học tập</p>
        
        <form onsubmit="event.preventDefault(); register();">
            <div class="form-group">
                <label>Họ và tên</label>
                <input type="text" id="fullname" placeholder="Nhập họ và tên" required>
            </div>
            
            <div class="form-group">
                <label>Tên đăng nhập</label>
                <input type="text" id="username" placeholder="Nhập tên đăng nhập (tối thiểu 6 ký tự)" required>
                <small style="color: #64748B; font-size: 13px; display: block; margin-top: 4px;">
                    Tên đăng nhập không thể thay đổi sau khi tạo
                </small>
            </div>
            
            <div class="form-group">
                <label>Mật khẩu</label>
                <input type="password" id="password" placeholder="Nhập mật khẩu" required>
                <small style="color: #64748B; font-size: 13px; display: block; margin-top: 4px;">
                    Tối thiểu 8 ký tự, có chữ hoa, chữ thường, số và ký tự đặc biệt
                </small>
            </div>
            
            <div class="checkbox-group">
                <input type="checkbox" id="agree-terms" required>
                <label for="agree-terms">Tôi đồng ý với điều khoản sử dụng</label>
            </div>
            
            <button type="submit" class="btn-primary">Đăng ký</button>
        </form>
        
        <div class="footer-link">
            Đã có tài khoản? <a href="dang-nhap.html">Đăng nhập</a>
        </div>
    </div>
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    
    <!-- Firebase Config -->
    <script src="../firebase-config.js"></script>
    
    <!-- Auth Logic -->
    <script src="auth.js"></script>
</body>
</html>
