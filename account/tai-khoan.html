<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hồ sơ cá nhân - SKY EDU</title>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Be Vietnam Pro', sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #EBF4FF 0%, #FFF7ED 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .header {
            background: white;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 24px;
            box-shadow: 0 4px 12px rgba(5, 26, 57, 0.08);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .logo-text {
            font-size: 24px;
            font-weight: 800;
            background: linear-gradient(135deg, #1677FF 0%, #4364F7 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .btn-back {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            background: #F1F5F9;
            color: #475569;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.2s;
        }
        
        .btn-back:hover {
            background: #E2E8F0;
        }
        
        .profile-container {
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 24px;
        }
        
        .profile-sidebar {
            background: white;
            border-radius: 16px;
            padding: 32px;
            box-shadow: 0 4px 12px rgba(5, 26, 57, 0.08);
            height: fit-content;
        }
        
        .avatar-section {
            text-align: center;
            margin-bottom: 24px;
            position: relative;
        }
        
        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: linear-gradient(135deg, #1677FF 0%, #4364F7 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            font-weight: 800;
            color: white;
            margin: 0 auto 16px;
            position: relative;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .avatar:hover {
            transform: scale(1.05);
        }
        
        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .avatar-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.6);
            color: white;
            padding: 8px;
            font-size: 12px;
            font-weight: 600;
            opacity: 0;
            transition: opacity 0.3s;
        }
        
        .avatar:hover .avatar-overlay {
            opacity: 1;
        }
        
        #avatarInput {
            display: none;
        }
        
        .user-name {
            font-size: 24px;
            font-weight: 800;
            color: #0F172A;
            margin-bottom: 8px;
        }
        
        .user-role {
            display: inline-block;
            padding: 6px 16px;
            background: #DBEAFE;
            color: #1677FF;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 700;
        }
        
        .user-role.admin {
            background: #FEE2E2;
            color: #DC2626;
        }
        
        .user-role.moderator {
            background: #FEF3C7;
            color: #F59E0B;
        }
        
        .info-group {
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid #E2E8F0;
        }
        
        .info-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 0;
            color: #64748B;
            font-size: 14px;
        }
        
        .info-item iconify-icon {
            font-size: 20px;
            color: #1677FF;
        }
        
        .info-item strong {
            color: #0F172A;
        }
        
        .action-buttons {
            margin-top: 24px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .btn {
            padding: 12px;
            border-radius: 10px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            text-decoration: none;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #1677FF 0%, #4364F7 100%);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(22, 119, 255, 0.3);
        }
        
        .btn-secondary {
            background: #F1F5F9;
            color: #475569;
        }
        
        .btn-secondary:hover {
            background: #E2E8F0;
        }
        
        .btn-danger {
            background: #FEE2E2;
            color: #DC2626;
        }
        
        .btn-danger:hover {
            background: #FEE2E2;
            transform: translateY(-2px);
        }
        
        .profile-main {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }
        
        .card {
            background: white;
            border-radius: 16px;
            padding: 32px;
            box-shadow: 0 4px 12px rgba(5, 26, 57, 0.08);
        }
        
        .card-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
        }
        
        .card-header iconify-icon {
            font-size: 28px;
            color: #1677FF;
        }
        
        .card-header h2 {
            font-size: 20px;
            color: #0F172A;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
        }
        
        .stat-card {
            background: linear-gradient(135deg, #EBF4FF 0%, #FFF7ED 100%);
            padding: 20px;
            border-radius: 12px;
            text-align: center;
        }
        
        .stat-value {
            font-size: 32px;
            font-weight: 800;
            color: #1677FF;
            margin-bottom: 8px;
        }
        
        .stat-label {
            font-size: 14px;
            color: #64748B;
            font-weight: 600;
        }
        
        .history-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px;
            background: #F8FAFC;
            border-radius: 10px;
            margin-bottom: 12px;
        }
        
        .history-info h4 {
            color: #0F172A;
            font-size: 16px;
            margin-bottom: 4px;
        }
        
        .history-info p {
            color: #64748B;
            font-size: 13px;
        }
        
        .history-score {
            font-size: 24px;
            font-weight: 800;
            color: #1677FF;
        }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #94A3B8;
        }
        
        .empty-state iconify-icon {
            font-size: 64px;
            margin-bottom: 16px;
            opacity: 0.5;
        }
        
        @media (max-width: 968px) {
            .profile-container {
                grid-template-columns: 1fr;
            }
            
            .stats-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="logo-text">SKY EDU</div>
            <a href="../index.html" class="btn-back">
                <iconify-icon icon="lucide:arrow-left"></iconify-icon>
                Về trang chủ
            </a>
        </div>
        
        <div class="profile-container">
            <!-- Sidebar -->
            <div class="profile-sidebar">
                <div class="avatar-section">
                    <div class="avatar" id="userAvatar" onclick="document.getElementById('avatarInput').click()">
                        A
                        <div class="avatar-overlay">
                            <iconify-icon icon="lucide:camera"></iconify-icon> Đổi ảnh
                        </div>
                    </div>
                    <input type="file" id="avatarInput" accept="image/*" onchange="changeAvatar(event)">
                    <div class="user-name" id="userName">Đang tải...</div>
                    <span class="user-role" id="userRole">User</span>
                </div>
                
                <div class="info-group">
                    <div class="info-item">
                        <iconify-icon icon="lucide:mail"></iconify-icon>
                        <div>
                            <strong id="userEmail">email@example.com</strong>
                        </div>
                    </div>
                    <div class="info-item">
                        <iconify-icon icon="lucide:calendar"></iconify-icon>
                        <div>
                            Tham gia: <strong id="joinDate">01/01/2026</strong>
                        </div>
                    </div>
                    <div class="info-item">
                        <iconify-icon icon="lucide:globe"></iconify-icon>
                        <div>
                            IP: <strong id="userIP">Đang tải...</strong>
                        </div>
                    </div>
                </div>
                
                <div class="action-buttons">
                    <a href="doi-mat-khau.html.html" class="btn btn-primary">
                        <iconify-icon icon="lucide:lock"></iconify-icon>
                        Đổi mật khẩu
                    </a>
                    <a href="admin.html.html" class="btn btn-secondary" id="adminBtn" style="display:none;">
                        <iconify-icon icon="lucide:settings"></iconify-icon>
                        Admin Panel
                    </a>
                    <button class="btn btn-danger" onclick="logout()">
                        <iconify-icon icon="lucide:log-out"></iconify-icon>
                        Đăng xuất
                    </button>
                </div>
            </div>
            
            <!-- Main Content -->
            <div class="profile-main">
                <!-- Statistics -->
                <div class="card">
                    <div class="card-header">
                        <iconify-icon icon="lucide:bar-chart-3"></iconify-icon>
                        <h2>Thống kê học tập</h2>
                    </div>
                    <div class="stats-grid">
                        <div class="stat-card">
                            <div class="stat-value" id="totalExams">0</div>
                            <div class="stat-label">Đề đã làm</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-value" id="avgScore">0%</div>
                            <div class="stat-label">Điểm trung bình</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-value" id="bestScore">0%</div>
                            <div class="stat-label">Điểm cao nhất</div>
                        </div>
                    </div>
                </div>
                
                <!-- History -->
                <div class="card">
                    <div class="card-header">
                        <iconify-icon icon="lucide:clock"></iconify-icon>
                        <h2>Lịch sử làm bài</h2>
                    </div>
                    <div id="historyList">
                        <div class="empty-state">
                            <iconify-icon icon="lucide:file-text"></iconify-icon>
                            <p>Chưa có lịch sử làm bài</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    
    <!-- Firebase Config -->
    <script src="../firebase-config.js"></script>
    
    <!-- Auth Logic -->
    <script src="auth.js"></script>
    <script>
        window.onload = function() {
            const currentUser = JSON.parse(localStorage.getItem('currentUser'));
            
            if (!currentUser) {
                alert('Vui lòng đăng nhập!');
                window.location.href = 'dang-nhap.html';
                return;
            }
            
            // Display user info
            displayUserInfo(currentUser);
            
            // Join date (fake for now)
            document.getElementById('joinDate').textContent = '01/01/2026';
            
            // Load exam history
            loadExamHistory();
        };
        
        function displayUserInfo(user) {
            const firstLetter = user.fullname ? user.fullname.charAt(0).toUpperCase() : 'U';
            const avatarElement = document.getElementById('userAvatar');
            
            // Check if user has custom avatar
            if (user.avatar) {
                avatarElement.innerHTML = `
                    <img src="${user.avatar}" alt="Avatar">
                    <div class="avatar-overlay">
                        <iconify-icon icon="lucide:camera"></iconify-icon> Đổi ảnh
                    </div>
                `;
            } else {
                avatarElement.innerHTML = `
                    ${firstLetter}
                    <div class="avatar-overlay">
                        <iconify-icon icon="lucide:camera"></iconify-icon> Đổi ảnh
                    </div>
                `;
            }
            
            document.getElementById('userName').textContent = user.fullname || 'User';
            document.getElementById('userEmail').textContent = user.username || 'N/A';
            document.getElementById('userIP').textContent = user.ip || 'N/A';
            
            // Role badge
            const roleElement = document.getElementById('userRole');
            if (user.role === 'admin') {
                roleElement.textContent = 'Admin';
                roleElement.className = 'user-role admin';
                document.getElementById('adminBtn').style.display = 'flex';
            } else if (user.role === 'moderator') {
                roleElement.textContent = 'Quản trị viên';
                roleElement.className = 'user-role moderator';
                document.getElementById('adminBtn').style.display = 'flex';
            } else {
                roleElement.textContent = 'Thành viên';
                roleElement.className = 'user-role';
            }
        }
        
        function changeAvatar(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            // Check file size (max 2MB)
            if (file.size > 2 * 1024 * 1024) {
                alert('Kích thước ảnh quá lớn! Vui lòng chọn ảnh nhỏ hơn 2MB.');
                return;
            }
            
            // Check file type
            if (!file.type.startsWith('image/')) {
                alert('Vui lòng chọn file ảnh!');
                return;
            }
            
            const reader = new FileReader();
            
            reader.onload = function(e) {
                const avatarData = e.target.result;
                
                // Update avatar display
                const avatarElement = document.getElementById('userAvatar');
                avatarElement.innerHTML = `
                    <img src="${avatarData}" alt="Avatar">
                    <div class="avatar-overlay">
                        <iconify-icon icon="lucide:camera"></iconify-icon> Đổi ảnh
                    </div>
                `;
                
                // Save to localStorage
                const currentUser = JSON.parse(localStorage.getItem('currentUser'));
                currentUser.avatar = avatarData;
                localStorage.setItem('currentUser', JSON.stringify(currentUser));
                
                // Update in users array
                const users = JSON.parse(localStorage.getItem('users')) || [];
                const userIndex = users.findIndex(u => u.username === currentUser.username);
                if (userIndex !== -1) {
                    users[userIndex].avatar = avatarData;
                    localStorage.setItem('users', JSON.stringify(users));
                }
                
                alert('✅ Đã cập nhật ảnh đại diện!');
            };
            
            reader.readAsDataURL(file);
        }
        
        function loadExamHistory() {
            // Get exam history from localStorage (this is a placeholder)
            const history = [];
            
            // Calculate stats
            const totalExams = history.length;
            let totalScore = 0;
            let bestScore = 0;
            
            history.forEach(exam => {
                const percentage = exam.percentage || 0;
                totalScore += percentage;
                if (percentage > bestScore) bestScore = percentage;
            });
            
            const avgScore = totalExams > 0 ? Math.round(totalScore / totalExams) : 0;
            
            // Update stats
            document.getElementById('totalExams').textContent = totalExams;
            document.getElementById('avgScore').textContent = avgScore + '%';
            document.getElementById('bestScore').textContent = bestScore + '%';
            
            // Render history
            const historyList = document.getElementById('historyList');
            if (history.length === 0) {
                historyList.innerHTML = `
                    <div class="empty-state">
                        <iconify-icon icon="lucide:file-text"></iconify-icon>
                        <p>Chưa có lịch sử làm bài</p>
                        <p style="margin-top: 8px; font-size: 13px;">Vào phòng luyện để bắt đầu làm đề thi!</p>
                    </div>
                `;
            } else {
                historyList.innerHTML = history.map(exam => `
                    <div class="history-item">
                        <div class="history-info">
                            <h4>${exam.examName}</h4>
                            <p>${new Date(exam.timestamp).toLocaleString('vi-VN')}</p>
                        </div>
                        <div class="history-score">${exam.percentage}%</div>
                    </div>
                `).join('');
            }
        }
    </script>
</body>
</html>
