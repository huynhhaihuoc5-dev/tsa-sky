<!DOCTYPE html>
<html lang="vi">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Quản trị SKY EDU</title>

<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Be Vietnam Pro',sans-serif;
}

body{

background:
linear-gradient(
135deg,
#051A39,
#0f3460
);

min-height:100vh;

padding:40px;

}

.admin-box{

max-width:1200px;

margin:auto;

background:white;

border-radius:20px;

padding:30px;

box-shadow:
0 20px 50px rgba(0,0,0,.15);

}

.title{

text-align:center;

font-size:35px;

font-weight:800;

color:#051A39;

margin-bottom:10px;

}

.subtitle{

text-align:center;

color:#64748B;

margin-bottom:30px;

}

.stats{

display:flex;

gap:20px;

margin-bottom:30px;

flex-wrap:wrap;

}

.stat{

flex:1;

min-width:220px;

padding:25px;

border-radius:15px;

color:white;

font-weight:700;

}

.stat h2{

font-size:35px;

margin-top:10px;

}

.blue{

background:
linear-gradient(
135deg,
#1677FF,
#38BDF8
);

}

.green{

background:
linear-gradient(
135deg,
#10B981,
#34D399
);

}

table{

width:100%;

border-collapse:collapse;

overflow:hidden;

border-radius:15px;

}

thead{

background:#051A39;

color:white;

}

th,
td{

padding:15px;

text-align:center;

}

tbody tr{

border-bottom:1px solid #E2E8F0;

}

tbody tr:hover{

background:#F8FAFC;

}

.badge{

padding:8px 12px;

border-radius:999px;

font-size:13px;

font-weight:700;

}

.active{

background:#DCFCE7;

color:#166534;

}

.banned{

background:#FEE2E2;

color:#991B1B;

}

.btn{

border:none;

padding:10px 15px;

border-radius:10px;

cursor:pointer;

font-weight:700;

color:white;

}

.btn-ban{

background:#F59E0B;

}

.btn-delete{

background:#EF4444;

}

.btn:hover{

opacity:.9;

}

.back-btn{

display:inline-block;

margin-bottom:20px;

padding:12px 20px;

background:#1677FF;

color:white;

text-decoration:none;

border-radius:10px;

font-weight:700;

}

@media(max-width:768px){

body{
padding:15px;
}

.admin-box{
padding:20px;
}

table{
font-size:14px;
}
.stats{
    display:flex;
    gap:20px;
    margin-bottom:25px;
}

.stat-box{
    flex:1;
    background:white;
    padding:25px;
    border-radius:15px;
    text-align:center;
    box-shadow:0 10px 25px rgba(0,0,0,.08);
}

.stat-box h2{
    font-size:35px;
    color:#1677FF;
    margin-bottom:8px;
}

.stat-box p{
    color:#64748B;
    font-weight:600;
}
}

</style>

</head>
<body>

<div class="admin-box">

<a href="../index.html" class="back-btn">
← Trang chủ
</a>

<h1 class="title">
ADMIN PANEL
</h1>

<p class="subtitle">
Quản lý toàn bộ tài khoản SKY EDU
</p>

<div class="stats">

<div class="stat blue">

Tổng tài khoản

<h2 id="totalUsers">
0
</h2>

</div>

<div class="stat green">

Đang hoạt động

<h2 id="activeUsers">
0
</h2>

</div>

</div>
<div class="stats">

    <div class="stat-box">
        <h2 id="totalUsers">0</h2>
        <p>Tổng tài khoản</p>
    </div>

    <div class="stat-box">
        <h2 id="activeUsers">0</h2>
        <p>Đang hoạt động</p>
    </div>

    <div class="stat-box">
        <h2 id="bannedUsers">0</h2>
        <p>Đã khóa</p>
    </div>

</div>
<table>

<thead>

<tr>

<th>Họ tên</th>
<th>Tài khoản</th>
<th>Vai trò</th>
<th>Trạng thái</th>
<th>Hành động</th>

</tr>

</thead>

<tbody id="userTable">

</tbody>

</table>

</div>

<script>

const currentUser =
JSON.parse(
localStorage.getItem("currentUser")
);

if(
!currentUser ||
currentUser.role !== "admin"
){

window.location.href =
"../index.html";

}

function renderUsers(){

const users =
JSON.parse(
localStorage.getItem("users")
) || [];
document.getElementById(
"totalUsers"
).innerText = users.length;

document.getElementById(
"activeUsers"
).innerText =
users.filter(
u => !u.banned
).length;

document.getElementById(
"bannedUsers"
).innerText =
users.filter(
u => u.banned
).length;

document.getElementById(
"totalUsers"
).innerText =
users.length;

document.getElementById(
"activeUsers"
).innerText =
users.filter(
u => !u.banned
).length;

let html = "";

users.forEach((user,index)=>{

html += `

<tr>

<td>${user.fullname}</td>

<td>${user.username}</td>

<td>${user.role || "user"}</td>

<td>

<span class="badge ${
user.banned
? "banned"
: "active"
}">

${user.banned
? "Đã khóa"
: "Hoạt động"}

</span>

</td>

<td>

<button
class="btn btn-ban"
onclick="toggleBan(${index})">

${user.banned
? "Mở khóa"
: "Khóa"}

</button>

<button
class="btn btn-delete"
onclick="deleteUser(${index})">

Xóa

</button>

</td>

</tr>

`;

});

document.getElementById(
"userTable"
).innerHTML = html;

}

function deleteUser(index){

const users =
JSON.parse(
localStorage.getItem("users")
);

if(users[index].role==="admin"){

alert("Không thể xóa Admin");

return;

}

if(!confirm("Xóa tài khoản này?")){

return;

}

users.splice(index,1);

localStorage.setItem(
"users",
JSON.stringify(users)
);

renderUsers();

}

function toggleBan(index){

const users =
JSON.parse(
localStorage.getItem("users")
);

if(users[index].role==="admin"){

alert("Không thể khóa Admin");

return;

}

users[index].banned =
!users[index].banned;

localStorage.setItem(
"users",
JSON.stringify(users)
);

renderUsers();

}

renderUsers();

</script>

</body>
</html>
