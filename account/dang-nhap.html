<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - SKY EDU</title>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Be Vietnam Pro', sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #EBF4FF 0%, #FFF7ED 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .card {
            background: white;
            border-radius: 20px;
            padding: 50px 40px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 20px 60px rgba(5, 26, 57, 0.1);
        }
        
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .logo-text {
            font-size: 32px;
            font-weight: 800;
            background: linear-gradient(135deg, #1677FF 0%, #4364F7 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
        }
        
        .logo-subtitle {
            font-size: 13px;
            color: #64748B;
            font-weight: 500;
        }
        
        h1 {
            font-size: 24px;
            color: #0F172A;
            text-align: center;
            margin-bottom: 10px;
        }
        
        .subtitle {
            text-align: center;
            color: #64748B;
            font-size: 14px;
            margin-bottom: 30px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            font-size: 13px;
            font-weight: 700;
            color: #334155;
            margin-bottom: 8px;
        }
        
        input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #E2E8F0;
            border-radius: 10px;
            font-size: 15px;
            transition: all 0.2s;
            outline: none;
        }
        
        input:focus {
            border-color: #1677FF;
            box-shadow: 0 0 0 3px rgba(22, 119, 255, 0.1);
        }
        
        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 24px;
        }
        
        .checkbox-group input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }
        
        .checkbox-group label {
            margin: 0;
            font-size: 14px;
            font-weight: 500;
            color: #475569;
            cursor: pointer;
        }
        
        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #1677FF 0%, #4364F7 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(22, 119, 255, 0.3);
        }
        
        .btn-login:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .footer-link {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: #64748B;
        }
        
        .footer-link a {
            color: #1677FF;
            font-weight: 600;
            text-decoration: none;
        }
        
        .footer-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">
            <div class="logo-text">SKY EDU</div>
            <div class="logo-subtitle">Fly higher - Think better</div>
        </div>
        
        <h1>Đăng nhập</h1>
        <p class="subtitle">Vui lòng đăng nhập để tiếp tục</p>
        
        <form id="loginForm">
            <div class="form-group">
                <label>Tên đăng nhập</label>
                <input type="text" id="username" placeholder="Nhập tên đăng nhập" required>
            </div>
            
            <div class="form-group">
                <label>Mật khẩu</label>
                <input type="password" id="password" placeholder="Nhập mật khẩu" required>
            </div>
            
            <div class="checkbox-group">
                <input type="checkbox" id="remember">
                <label for="remember">Ghi nhớ đăng nhập</label>
            </div>
            
            <button type="submit" class="btn-login">
                <span>→</span> Đăng nhập
            </button>
        </form>
        
        <div class="footer-link">
            Chưa có tài khoản? <a href="dang-ky.html">Đăng ký ngay</a>
        </div>
    </div>
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="../firebase-config.js"></script>
    
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value.trim().toLowerCase();
            const password = document.getElementById('password').value.trim();
            
            if (!username || !password) {
                alert('Vui lòng nhập đầy đủ thông tin');
                return;
            }
            
            const btn = document.querySelector('.btn-login');
            btn.disabled = true;
            btn.innerHTML = '<span>⏳</span> Đang đăng nhập...';
            
            try {
                const email = username + '@skyedu.id.vn';
                const userCred = await firebase.auth().signInWithEmailAndPassword(email, password);
                const uid = userCred.user.uid;
                
                // Lấy thông tin user từ database
                const snapshot = await firebase.database().ref('users/' + uid).once('value');
                const userData = snapshot.val();
                
                if (!userData) {
                    alert('❌ Không tìm thấy thông tin tài khoản');
                    await firebase.auth().signOut();
                    btn.disabled = false;
                    btn.innerHTML = '<span>→</span> Đăng nhập';
                    return;
                }
                
                if (userData.banned) {
                    alert('❌ Tài khoản của bạn đã bị khóa');
                    await firebase.auth().signOut();
                    btn.disabled = false;
                    btn.innerHTML = '<span>→</span> Đăng nhập';
                    return;
                }
                
                // Lưu vào localStorage
                localStorage.setItem('currentUser', JSON.stringify({
                    uid,
                    username,
                    fullname: userData.fullname,
                    role: userData.role,
                    email: userData.email,
                    ip: userData.ip
                }));
                
                alert('✅ Đăng nhập thành công!');
                
                // Chuyển hướng
                if (userData.role === 'admin' || userData.role === 'moderator') {
                    window.location.href = 'admin.html';
                } else {
                    window.location.href = '../index.html';
                }
            } catch (error) {
                console.error('Lỗi:', error);
                if (error.code === 'auth/user-not-found' || error.code === 'auth/wrong-password') {
                    alert('❌ Tên đăng nhập hoặc mật khẩu không đúng');
                } else {
                    alert('Lỗi: ' + error.message);
                }
                btn.disabled = false;
                btn.innerHTML = '<span>→</span> Đăng nhập';
            }
        });
    </script>
</body>
</html>
