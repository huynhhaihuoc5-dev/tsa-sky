<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký - SKY EDU</title>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Be Vietnam Pro', sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #EBF4FF 0%, #FFF7ED 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .card {
            background: white;
            border-radius: 20px;
            padding: 50px 40px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 20px 60px rgba(5, 26, 57, 0.1);
        }
        
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .logo-text {
            font-size: 32px;
            font-weight: 800;
            background: linear-gradient(135deg, #1677FF 0%, #4364F7 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
        }
        
        .logo-subtitle {
            font-size: 13px;
            color: #64748B;
            font-weight: 500;
        }
        
        h1 {
            font-size: 24px;
            color: #0F172A;
            text-align: center;
            margin-bottom: 10px;
        }
        
        .subtitle {
            text-align: center;
            color: #64748B;
            font-size: 14px;
            margin-bottom: 30px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            font-size: 13px;
            font-weight: 700;
            color: #334155;
            margin-bottom: 8px;
        }
        
        input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #E2E8F0;
            border-radius: 10px;
            font-size: 15px;
            transition: all 0.2s;
            outline: none;
        }
        
        input:focus {
            border-color: #1677FF;
            box-shadow: 0 0 0 3px rgba(22, 119, 255, 0.1);
        }
        
        .password-note {
            font-size: 12px;
            color: #64748B;
            margin-top: 6px;
            line-height: 1.4;
        }
        
        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 24px;
        }
        
        .checkbox-group input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }
        
        .checkbox-group label {
            margin: 0;
            font-size: 14px;
            font-weight: 500;
            color: #475569;
            cursor: pointer;
        }
        
        .btn-register {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #1677FF 0%, #4364F7 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        
        .btn-register:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(22, 119, 255, 0.3);
        }
        
        .btn-register:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .footer-link {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: #64748B;
        }
        
        .footer-link a {
            color: #1677FF;
            font-weight: 600;
            text-decoration: none;
        }
        
        .footer-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">
            <div class="logo-text">SKY EDU</div>
            <div class="logo-subtitle">Fly higher - Think better</div>
        </div>
        
        <h1>Đăng ký tài khoản</h1>
        <p class="subtitle">Tạo tài khoản để bắt đầu học tập</p>
        
        <form id="registerForm">
            <div class="form-group">
                <label>Họ và tên</label>
                <input type="text" id="fullname" placeholder="Nhập họ và tên" required>
            </div>
            
            <div class="form-group">
                <label>Tên đăng nhập</label>
                <input type="text" id="username" placeholder="Nhập tên đăng nhập" required minlength="6">
                <small style="color: #64748B; font-size: 12px; display: block; margin-top: 4px;">
                    Tối thiểu 6 ký tự (chữ cái, số, gạch dưới)
                </small>
            </div>
            
            <div class="form-group">
                <label>Mật khẩu</label>
                <input type="password" id="password" placeholder="Nhập mật khẩu" required>
                <div class="password-note">
                    • Tối thiểu 8 ký tự<br>
                    • 1 chữ hoa, 1 chữ thường<br>
                    • 1 số, 1 ký tự đặc biệt (@$!%*?&.#)
                </div>
            </div>
            
            <div class="form-group">
                <label>Xác nhận mật khẩu</label>
                <input type="password" id="confirmPassword" placeholder="Nhập lại mật khẩu" required>
            </div>
            
            <div class="checkbox-group">
                <input type="checkbox" id="agree-terms" required>
                <label for="agree-terms">Tôi đồng ý với điều khoản sử dụng</label>
            </div>
            
            <button type="submit" class="btn-register">
                <span>👤</span> Đăng ký
            </button>
        </form>
        
        <div class="footer-link">
            Đã có tài khoản? <a href="dang-nhap.html.html">Đăng nhập</a>
        </div>
    </div>
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="../firebase-config.js"></script>
    
    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const fullname = document.getElementById('fullname').value.trim();
            const username = document.getElementById('username').value.trim().toLowerCase();
            const password = document.getElementById('password').value.trim();
            const confirmPassword = document.getElementById('confirmPassword').value.trim();
            
            // Validation
            if (!fullname || !username || !password) {
                alert('Vui lòng nhập đầy đủ thông tin');
                return;
            }
            
            if (username.length < 6) {
                alert('Tên đăng nhập phải từ 6 ký tự trở lên');
                return;
            }
            
            if (!/^[a-z0-9_]{6,}$/.test(username)) {
                alert('Tên đăng nhập chỉ chứa chữ cái, số và gạch dưới');
                return;
            }
            
            if (password.length < 8) {
                alert('Mật khẩu phải từ 8 ký tự trở lên');
                return;
            }
            
            if (!/^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&.#])/.test(password)) {
                alert('Mật khẩu phải có chữ hoa, chữ thường, số và ký tự đặc biệt');
                return;
            }
            
            if (password !== confirmPassword) {
                alert('Mật khẩu xác nhận không khớp');
                return;
            }
            
            // Register
            const btn = document.querySelector('.btn-register');
            btn.disabled = true;
            btn.innerHTML = '<span>⏳</span> Đang xử lý...';
            
            try {
                const email = username + '@skyedu.id.vn';
                const userCred = await firebase.auth().createUserWithEmailAndPassword(email, password);
                const uid = userCred.user.uid;
                
                // Lấy IP
                const ipResponse = await fetch('https://api.ipify.org?format=json');
                const ipData = await ipResponse.json();
                const userIP = ipData.ip;
                
                // Lưu vào database
                await firebase.database().ref('users/' + uid).set({
                    fullname,
                    username,
                    email,
                    role: 'user',
                    banned: false,
                    ip: userIP,
                    lastIPChange: firebase.database.ServerValue.TIMESTAMP,
                    createdAt: firebase.database.ServerValue.TIMESTAMP
                });
                
                alert('✅ Đăng ký thành công! Chuyển đến trang đăng nhập...');
                window.location.href = 'dang-nhap.html';
            } catch (error) {
                console.error('Lỗi:', error);
                if (error.code === 'auth/email-already-in-use') {
                    alert('Tên đăng nhập này đã được sử dụng');
                } else {
                    alert('Lỗi: ' + error.message);
                }
                btn.disabled = false;
                btn.innerHTML = '<span>👤</span> Đăng ký';
            }
        });
    </script>
</body>
</html>
