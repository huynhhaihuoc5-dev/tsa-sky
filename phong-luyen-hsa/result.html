<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kết quả thi HSA - SKY EDU</title>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
    <link rel="stylesheet" href="../assets/css/style.css">
    <style>
        body {
            background: linear-gradient(135deg, #EBF4FF 0%, #FFF7ED 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }
        
        .result-container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 24px;
            padding: 48px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.1);
        }
        
        .result-header {
            text-align: center;
            margin-bottom: 40px;
        }
        
        .result-logo {
            font-size: 36px;
            font-weight: 800;
            color: var(--dark-navy);
            margin-bottom: 12px;
        }
        
        .result-score {
            font-size: 72px;
            font-weight: 800;
            color: var(--primary-blue);
            margin: 24px 0;
        }
        
        .result-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin: 40px 0;
        }
        
        .stat-box {
            background: #F8FAFC;
            padding: 24px;
            border-radius: 16px;
            text-align: center;
            border: 2px solid #E2E8F0;
        }
        
        .stat-box h3 {
            font-size: 32px;
            font-weight: 800;
            color: var(--dark-navy);
            margin-bottom: 8px;
        }
        
        .stat-box p {
            color: var(--text-muted);
            font-weight: 600;
            font-size: 14px;
        }
        
        .wrong-list {
            margin-top: 40px;
        }
        
        .wrong-item {
            background: #FEF2F2;
            border: 2px solid #FECACA;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 16px;
        }
        
        .wrong-item h4 {
            color: #B91C1C;
            font-size: 16px;
            margin-bottom: 12px;
            font-weight: 700;
        }
        
        .wrong-item p {
            font-size: 15px;
            color: #475569;
            line-height: 1.7;
            margin: 8px 0;
        }
        
        .explanation-box {
            margin-top: 16px;
            padding: 16px;
            background: #F0F9FF;
            border-left: 4px solid #1677FF;
            border-radius: 8px;
        }
        
        .btn-action {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: var(--primary-blue);
            color: white;
            padding: 16px 32px;
            border-radius: 12px;
            font-weight: 700;
            text-decoration: none;
            margin: 8px;
            transition: all 0.2s;
        }
        
        .btn-action:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(22, 119, 255, 0.3);
        }
        
        .btn-secondary {
            background: white;
            color: var(--primary-blue);
            border: 2px solid var(--primary-blue);
        }
    </style>
</head>
<body>


    <div class="result-container">
        <div class="result-header">
            <div class="result-logo">HSA SKY</div>
            <h1 style="color: var(--dark-navy); font-size: 28px; margin-bottom: 8px;">Hoàn thành bài thi!</h1>
            <p style="color: var(--text-muted); font-size: 16px;" id="examName"></p>
            <div class="result-score" id="scoreDisplay">0/0</div>
            <div style="font-size: 20px; font-weight: 700; color: var(--text-muted);">
                Tỷ lệ: <span id="percentageDisplay" style="color: var(--primary-blue);">0%</span>
            </div>
        </div>
        
        <div class="result-stats">
            <div class="stat-box">
                <h3 id="correctCount">0</h3>
                <p>Câu đúng</p>
            </div>
            <div class="stat-box">
                <h3 id="wrongCount">0</h3>
                <p>Câu sai</p>
            </div>
            <div class="stat-box">
                <h3 id="totalCount">0</h3>
                <p>Tổng số câu</p>
            </div>
        </div>
        
        <div style="text-align: center; margin: 40px 0;">
            <a href="../index.html" class="btn-action">
                <iconify-icon icon="lucide:home"></iconify-icon>
                Về phòng luyện
            </a>
            <a href="#wrong-list" class="btn-action btn-secondary" id="reviewBtn">
                <iconify-icon icon="lucide:book-open"></iconify-icon>
                Xem đáp án
            </a>
        </div>
        
        <div class="wrong-list" id="wrongList"></div>
    </div>

    <script src="../assets/js/main.js"></script>
    <script>
        window.onload = function() {
            const result = JSON.parse(localStorage.getItem('lastExamResult'));
            
            if (!result) {
                alert('Không tìm thấy kết quả thi!');
                window.location.href = 'index.html';
                return;
            }
            
            // Hiển thị thông tin
            document.getElementById('examName').innerText = result.examName + ' - Mã đề: ' + result.examCode;
            document.getElementById('scoreDisplay').innerText = `${result.score}/${result.total}`;
            document.getElementById('percentageDisplay').innerText = result.percentage + '%';
            document.getElementById('correctCount').innerText = result.score;
            document.getElementById('wrongCount').innerText = result.total - result.score;
            document.getElementById('totalCount').innerText = result.total;
            
            // Hiển thị câu sai
            const wrongList = document.getElementById('wrongList');
            
            if (result.wrongQuestions.length === 0) {
                wrongList.innerHTML = `
                    <div style="background: #DCFCE7; border: 2px solid #10B981; padding: 32px; border-radius: 16px; text-align: center;">
                        <iconify-icon icon="lucide:trophy" style="font-size: 64px; color: #10B981;"></iconify-icon>
                        <h2 style="color: #166534; font-size: 24px; margin-top: 16px;">Xuất sắc!</h2>
                        <p style="color: #166534; font-size: 16px; margin-top: 8px;">Bạn đã trả lời đúng tất cả các câu hỏi!</p>
                    </div>
                `;
                document.getElementById('reviewBtn').style.display = 'none';
            } else {
                wrongList.innerHTML = `
                    <h2 id="wrong-list" style="color: var(--dark-navy); font-size: 24px; margin-bottom: 24px; text-align: center;">
                        📝 Danh sách câu sai (${result.wrongQuestions.length} câu)
                    </h2>
                ` + result.wrongQuestions.map(item => `
                    <div class="wrong-item">
                        <h4>Câu ${item.index}</h4>
                        <p><strong>Câu hỏi:</strong> ${item.question.substring(0, 200)}${item.question.length > 200 ? '...' : ''}</p>
                        <p><strong>Bạn chọn:</strong> <span style="color: #DC2626; font-weight: 700;">${item.userAnswer}</span></p>
                        <p><strong>Đáp án đúng:</strong> <span style="color: #10B981; font-weight: 700;">${item.correctAnswer}</span></p>
                        ${item.explanation ? `
                            <div class="explanation-box">
                                <h4 style="color: #1677FF; margin-bottom: 8px; font-size: 14px;">💡 Lời giải chi tiết:</h4>
                                <p style="color: #1e293b; line-height: 1.7;">${item.explanation}</p>
                            </div>
                        ` : ''}
                    </div>
                `).join('');
            }
        };
    </script>
</body>
</html>
